services:
  lms-web-prod:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
      target: prod
    container_name: lms-web-prod
    ports:
      - "8080:80"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    restart: always
    networks:
      - lms-network

networks:
  lms-network:
    external: true
