services:
  lms-web:
    build: .
    container_name: lms-web
    environment:
      - VITE_API_BASE_URL=http://lms-api.web.local/api/v1
    command: sh -c "npm run dev -- --host"
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - nginx-proxy
networks:
  nginx-proxy:
    external: true
