services:
  lms-web:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
      target: dev
    container_name: lms-web
    ports:
      - ${PORT}:5173
    volumes:
      - ../:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    restart: always
    networks:
      - lms-network

networks:
  lms-network:
    external: true
